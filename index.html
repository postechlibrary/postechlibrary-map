    <meta charset="UTF-8">

    <title>POSTECH 박태준학술정보관 통합 서가맵</title>

    <style>

        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; background-color: #f4f7f9; }

        .map-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; display: inline-block; width: 95%; max-width: 1000px; }

        #status-bar { padding: 15px; font-size: 1.1em; font-weight: bold; color: #d32f2f; background: #fff3f3; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffcdd2; }

        .map-layer { display: none; width: 100%; height: auto; }

        .active { display: block !important; }

       @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        

        /* 1. 하이라이트 효과: 어떤 스타일보다 우선하도록 !important를 떡칠합니다 */

        .highlight { 

            stroke: #ff0000 !important; 

            stroke-width: 15px !important; 

            fill: #ff0000 !important; 

            fill-opacity: 0.6 !important;

            filter: drop-shadow(0 0 8px rgba(255,0,0,0.7)); 

            animation: blink 0.8s infinite; 

        }



        /* 2. 글자색 고정: 다른 층의 검은색 스타일이 침범하지 못하게 핑크색(#c9005f) 강제 고정 */

        svg text { 

            fill: #c9005f !important; 

            font-family: sans-serif !important; 

            font-weight: bold !important;

        }



        /* 3. 화살표 선 고정: 화살표가 검게 변했다면 이 부분도 추가해 주세요 */

        .cls-10 { 

            stroke: #c9005f !important; 

        }

    </style>

</head>

    function normalizeCN(cn) {
        if (!cn) return "";
        let out = cn.toUpperCase().replace(/\s+/g, '');
        out = out.replace(/([A-Z]+)(\d+)/g, (m, p1, p2) => p1 + p2.padStart(5, '0'));
        out = out.replace(/\.(\d+)/g, (m, p1) => p1.padEnd(5, '0'));
        return out;
    }

    // 💡 [핵심 수정] 낡은 determineFloor 함수를 완전히 제거했습니다.

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        let rawLOC = params.get('loc') || "";
        const rawCN = params.get('cn') || "";
        const status = document.getElementById('status-bar');

        let targetFloor = 3;
        let targetIds = [];

        let cleanLOC = rawLOC.replace(/\s+/g, '').toUpperCase();

        const matchedLocKey = Object.keys(specialLocations).find(key => {
            let cleanKey = key.replace(/\s+/g, '').toUpperCase();
            return cleanLOC.includes(cleanKey);
        });

        // [우선순위 1] 특수 위치 (신착서가, 딸림자료 등)
        if (matchedLocKey) {
            targetFloor = specialLocations[matchedLocKey].floor;
            targetIds = specialLocations[matchedLocKey].ids;
            const displayName = specialLocations[matchedLocKey].name; 
            status.innerHTML = `✅ 위치 안내: <span style="color:#005a92;">${displayName}</span>`;
        } 
        // [우선순위 2] 일반 청구기호 검색 (단행본 등)
        else if (rawCN) {
            const targetNormalized = normalizeCN(rawCN);
            const foundShelf = shelfMapping.find(d => {
                const startNorm = normalizeCN(d.start);
                const endNorm = normalizeCN(d.end);
                return targetNormalized >= startNorm && targetNormalized <= endNorm;
            });

            // 💡 [핵심 로직] 텍스트에 "4층"이 명확히 있거나, 3층 서가 목록에 없으면 4층! 그 외엔 3층!
            if (cleanLOC.includes('4층') || cleanLOC.includes('4F')) {
                targetFloor = 4;
                status.innerHTML = `✅ 위치 안내: 4층 <br>📚 청구기호 [${rawCN}] (세부서가 업데이트 예정)`;
            } else if (cleanLOC.includes('3층') || cleanLOC.includes('3F') || foundShelf) {
                targetFloor = 3;
                if (foundShelf) {
                    targetIds.push(foundShelf.id);
                    status.innerHTML = `✅ 위치 안내: 3층 단행본 <br>📚 청구기호 [${rawCN}] ➡️ <span style="color:#005a92;">${foundShelf.id.replace('_', '')} 서가</span>`;
                } else {
                    status.innerHTML = `❌ 3층 서가 범위 밖입니다: [${rawCN}]`;
                }
            } else {
                targetFloor = 4;
                status.innerHTML = `✅ 위치 안내: 4층 <br>📚 청구기호 [${rawCN}] (3층 서가 범위 밖/업데이트 예정)`;
            }
        } else {
            status.innerText = `🔍 일반 도서 혹은 위치 정보 없음`;
        }

        // 화면 레이어 처리 (해당 층 띄우고 서가에 불 켜기)
        document.querySelectorAll('.map-layer').forEach(div => div.classList.remove('active'));
        const activeLayer = document.getElementById(`svg-${targetFloor}f`);
        
        if (activeLayer) {
            activeLayer.classList.add('active');
            document.getElementById('floor-title').innerText = `📍 ${targetFloor}층 위치 안내`;
            
            setTimeout(() => {
                targetIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('highlight');
                });
            }, 100);
        }
    };
</script>
